<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Higher or Lower - RYM Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #000;
            color: #fff;
            overflow: hidden;
            margin: 0;
        }

        .game-container {
            display: flex;
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        .side {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            position: relative;
            background-size: cover;
            background-position: center;
            transition: transform 0.6s cubic-bezier(0.65, 0, 0.35, 1);
        }

        .side::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.4), rgba(0,0,0,0.8));
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .vs-circle {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background: #fff;
            color: #000;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 900;
            font-size: 1.5rem;
            z-index: 20;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .stat-value {
            font-size: 3.5rem;
            font-weight: 900;
            margin: 0.5rem 0;
            color: #facc15;
        }

        .btn-choice {
            background: transparent;
            border: 2px solid #fff;
            color: #fff;
            padding: 1rem 3rem;
            font-size: 1.25rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 0.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
            width: 220px;
            justify-content: center;
        }

        .btn-choice:hover {
            background: #fff;
            color: #000;
        }

        .genre-tag {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            padding: 6px 16px;
            border-radius: 4px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            z-index: 15;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .score-badge {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 10px;
            z-index: 30;
            font-weight: bold;
        }

        .game-over-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 100;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .game-over-overlay.visible {
            display: flex;
            opacity: 1;
        }

        .wrong-flash {
            animation: flashRed 0.5s;
        }

        @keyframes flashRed {
            0%, 100% { background-color: transparent; }
            50% { background-color: rgba(239, 68, 68, 0.4); }
        }

        @media (max-width: 768px) {
            .game-container { flex-direction: column; }
            .vs-circle { width: 60px; height: 60px; font-size: 1.2rem; }
            .stat-value { font-size: 2.5rem; }
            .genre-tag { bottom: 10px; }
        }
    </style>
</head>

                </div>

                <div class="stat-value hidden" id="right-stat">0</div>
                <p class="text-sm uppercase tracking-widest opacity-60">on rateyourmusic.com</p>
            </div>
            <div class="genre-tag" id="right-genre">GENRE</div>
        </div>
    </div>

    </div>

        ];

        let score = 0;
        let highscore = 0;
        let currentLeft;
        let currentRight;
        let usedIndices = [];
        let isTransitioning = false;

        const leftNameEl = document.getElementById('left-name');
        const rightNameEl = document.getElementById('right-name');
        const leftSubtitleEl = document.getElementById('left-subtitle');
        const rightSubtitleEl = document.getElementById('right-subtitle');
        const leftGenreEl = document.getElementById('left-genre');
        const rightGenreEl = document.getElementById('right-genre');
        const leftStatEl = document.getElementById('left-stat');
        const rightStatEl = document.getElementById('right-stat');
        const guessControls = document.getElementById('guess-controls');
        const scoreDisplay = document.getElementById('score-display');
        const gameOverOverlay = document.getElementById('game-over');
        const finalScoreEl = document.getElementById('final-score');
        const leftSide = document.getElementById('left-side');
        const rightSide = document.getElementById('right-side');

        function getRandomItem() {
            if (usedIndices.length >= items.length) usedIndices = [];
            
            let index;
            do {
                index = Math.floor(Math.random() * items.length);
            } while (usedIndices.includes(index) || (currentLeft && items[index].name === currentLeft.name));
            
            usedIndices.push(index);
            return items[index];
        }

        function formatNumber(num) {
            // Force 2 decimal points
            return parseFloat(num).toFixed(2);
        }

        function animateNumber(element, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                const currentVal = (progress * (end - start) + start);
                element.innerText = formatNumber(currentVal);
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                }
            };
            window.requestAnimationFrame(step);
        }

        function initRound() {
            if (!currentLeft) {
                currentLeft = getRandomItem();
            }
            currentRight = getRandomItem();

            leftSide.style.backgroundImage = `url(${currentLeft.img})`;
            rightSide.style.backgroundImage = `url(${currentRight.img})`;

            leftNameEl.innerText = `${currentLeft.name}`;
            leftSubtitleEl.innerText = currentLeft.subtitle;
            leftGenreEl.innerText = currentLeft.genre;
            
            rightNameEl.innerText = `${currentRight.name}`;
            rightSubtitleEl.innerText = currentRight.subtitle;
            rightGenreEl.innerText = currentRight.genre;
            
            leftStatEl.innerText = formatNumber(currentLeft.value);
            
            rightStatEl.classList.add('hidden');
            guessControls.classList.remove('hidden');
            isTransitioning = false;
        }

        function makeGuess(choice) {
            if (isTransitioning) return;
            isTransitioning = true;

            const win = (choice === 'higher' && currentRight.value >= currentLeft.value) ||
                        (choice === 'lower' && currentRight.value <= currentLeft.value);

            guessControls.classList.add('hidden');
            rightStatEl.classList.remove('hidden');
            animateNumber(rightStatEl, 0, currentRight.value, 800);

            setTimeout(() => {
                if (win) {
                    handleWin();
                } else {
                    handleLoss();
                }
            }, 1500);
        }

        function handleWin() {
            score++;
            if (score > highscore) highscore = score;
            updateScore();
            
            rightStatEl.classList.add('text-green-400');
            
            setTimeout(() => {
                rightStatEl.classList.remove('text-green-400');
                
                leftSide.style.transform = 'translateX(-100%)';
                rightSide.style.transform = 'translateX(-100%)';
                
                setTimeout(() => {
                    currentLeft = currentRight;
                    
                    leftSide.style.transition = 'none';
                    rightSide.style.transition = 'none';
                    leftSide.style.transform = 'translateX(0)';
                    rightSide.style.transform = 'translateX(0)';
                    
                    leftSide.offsetHeight; 
                    
                    leftSide.style.transition = '';
                    rightSide.style.transition = '';
                    
                    initRound();
                }, 600);
            }, 800);
        }

        function handleLoss() {
            document.body.classList.add('wrong-flash');
            setTimeout(() => document.body.classList.remove('wrong-flash'), 500);
            
            finalScoreEl.innerText = score;
            gameOverOverlay.classList.add('visible');
        }

        function updateScore() {
            scoreDisplay.innerText = `High Score: ${highscore} | Score: ${score}`;
        }

        function resetGame() {
            score = 0;
            usedIndices = [];
            currentLeft = null;
            updateScore();
            gameOverOverlay.classList.remove('visible');
            initRound();
        }

        window.onload = initRound;
    </script>
